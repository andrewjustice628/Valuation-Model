[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback so client routes resolve; /api/* is handled by the function's
# own config.path and is matched before this catch-all.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
